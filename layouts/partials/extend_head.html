{{- /* Custom styles */ -}}
<style>
/* === Home Hero with Avatar === */
.home-info .home-info-inner {
    display: flex;
    align-items: center;
    gap: 2rem;
}

.home-avatar img {
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--tertiary);
    transition: transform 0.3s ease;
}

.home-avatar img:hover {
    transform: scale(1.05);
}

.home-text {
    flex: 1;
}

.home-info .entry-header h1 {
    margin-top: 0;
}

/* === Footer Contact === */
.footer-contact {
    border-top: 1px solid var(--tertiary);
    padding: 1.5rem 0 1rem;
    margin: 0 auto;
    max-width: var(--main-width);
    text-align: center;
}

.footer-contact h3 {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    color: var(--primary);
}

.footer-contact-links {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 1.2rem;
}

.footer-contact-links a,
.footer-contact-links .footer-location {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.85rem;
    color: var(--secondary);
    text-decoration: none;
    transition: color 0.2s ease;
}

.footer-contact-links a:hover {
    color: var(--primary);
}

.footer-contact-links svg {
    flex-shrink: 0;
}

/* === Search Icon in Nav === */
#menu li a svg {
    vertical-align: middle;
}

/* === Post Entry Hover Effect === */
.post-entry {
    transition: transform 0.2s ease;
}

.post-entry:hover {
    transform: translateX(4px);
}

/* === Responsive === */
@media (max-width: 600px) {
    .home-info .home-info-inner {
        flex-direction: column;
        text-align: center;
    }

    .home-info .entry-footer {
        justify-content: center;
    }

    .footer-contact-links {
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
    }
}
</style>
