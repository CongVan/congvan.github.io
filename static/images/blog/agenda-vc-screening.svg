<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: none; }
      .box { fill: none; stroke: #555; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .arrow { stroke: #888; fill: #888; }
      .connector { stroke: #555; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: none; }
      .box { fill: none; stroke: #ccc; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #666; }
      .arrow { stroke: #999; fill: #999; }
      .connector { stroke: #ccc; }
    }
  </style>
  <rect class="bg" width="800" height="300" rx="6"/>

  <text x="400" y="28" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Example: Candidate Screening Agenda</text>

  <!-- Row 1 -->
  <rect class="box" x="30" y="50" width="230" height="60" rx="5" stroke-width="1.5"/>
  <text x="40" y="68" class="text-label" font-size="9" font-weight="600">CONVEY</text>
  <text x="145" y="90" text-anchor="middle" class="text-muted" font-size="10">"Thanks for applying..."</text>

  <line x1="260" y1="80" x2="285" y2="80" class="arrow" stroke-width="1.5"/>
  <polygon points="283,76 290,80 283,84" class="arrow"/>

  <rect class="box" x="290" y="50" width="230" height="60" rx="5" stroke-width="1.5"/>
  <text x="300" y="68" class="text-label" font-size="9" font-weight="600">GATHER</text>
  <text x="405" y="90" text-anchor="middle" class="text-muted" font-size="10">name, email, funding stage</text>

  <line x1="520" y1="80" x2="545" y2="80" class="arrow" stroke-width="1.5"/>
  <polygon points="543,76 550,80 543,84" class="arrow"/>

  <rect class="box" x="550" y="50" width="230" height="60" rx="5" stroke-width="1.5"/>
  <text x="560" y="68" class="text-label" font-size="9" font-weight="600">DEBATE</text>
  <text x="665" y="90" text-anchor="middle" class="text-muted" font-size="10">"What problem do you solve?"</text>

  <!-- Connector to row 2 -->
  <path d="M665 110 L665 140 L145 140 L145 155" class="connector" stroke-width="1.5" fill="none"/>
  <polygon points="140,153 145,160 150,153" class="arrow"/>

  <!-- Row 2 -->
  <rect class="box" x="30" y="160" width="230" height="60" rx="5" stroke-width="1.5"/>
  <text x="40" y="178" class="text-label" font-size="9" font-weight="600">DEBATE</text>
  <text x="145" y="200" text-anchor="middle" class="text-muted" font-size="10">"What's your GTM strategy?"</text>

  <line x1="260" y1="190" x2="285" y2="190" class="arrow" stroke-width="1.5"/>
  <polygon points="283,186 290,190 283,194" class="arrow"/>

  <rect class="box" x="290" y="160" width="230" height="60" rx="5" stroke-width="1.5"/>
  <text x="300" y="178" class="text-label" font-size="9" font-weight="600">Q&amp;A</text>
  <text x="405" y="200" text-anchor="middle" class="text-muted" font-size="10">"Any questions for us?"</text>

  <line x1="520" y1="190" x2="545" y2="190" class="arrow" stroke-width="1.5"/>
  <polygon points="543,186 550,190 543,194" class="arrow"/>

  <rect class="box" x="550" y="160" width="230" height="60" rx="5" stroke-width="1.5"/>
  <text x="560" y="178" class="text-label" font-size="9" font-weight="600">CONVEY (dynamic)</text>
  <text x="665" y="200" text-anchor="middle" class="text-muted" font-size="10">Personalized closing</text>

  <!-- Footer -->
  <text x="400" y="260" text-anchor="middle" class="text-muted" font-size="10">Data flows between items: outputs from Gather available in Debate prompts and Convey messages</text>
</svg>
