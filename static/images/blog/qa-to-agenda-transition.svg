<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: none; stroke: #555; }
      .bubble { fill: #2e2e33; stroke: #414244; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .arrow { stroke: #888; fill: #888; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .box { fill: none; stroke: #ccc; }
      .bubble { fill: #fff; stroke: #ddd; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .arrow { stroke: #999; fill: #999; }
    }
  </style>
  <rect class="bg" width="800" height="220" rx="6"/>

  <text x="400" y="25" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Q&amp;A → Agenda Transition</text>

  <!-- Q&A -->
  <rect class="box" x="30" y="42" width="220" height="150" rx="5" stroke-width="1.5"/>
  <text x="140" y="62" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Q&amp;A Mode</text>

  <rect class="bubble" x="45" y="72" width="190" height="24" rx="10" stroke-width="1"/>
  <text x="140" y="88" text-anchor="middle" class="text-muted" font-size="9">"What services do you offer?"</text>

  <rect class="bubble" x="45" y="102" width="190" height="24" rx="10" stroke-width="1"/>
  <text x="140" y="118" text-anchor="middle" class="text-muted" font-size="9">"How much does it cost?"</text>

  <rect class="bubble" x="45" y="132" width="190" height="24" rx="10" stroke-width="1"/>
  <text x="140" y="148" text-anchor="middle" class="text-muted" font-size="9">"Do you have a free trial?"</text>

  <text x="140" y="180" text-anchor="middle" class="text-muted" font-size="8">Knowledge base answers</text>

  <!-- Trigger -->
  <line x1="250" y1="117" x2="320" y2="117" class="arrow" stroke-width="1.5"/>
  <polygon points="318,112 328,117 318,122" class="arrow"/>
  <text x="285" y="108" text-anchor="middle" class="text-muted" font-size="9">trigger</text>

  <!-- Detection -->
  <rect class="box" x="330" y="82" width="160" height="70" rx="5" stroke-width="1.5"/>
  <text x="410" y="108" text-anchor="middle" class="text-primary" font-size="10" font-weight="500">Trigger Detection</text>
  <rect class="bubble" x="345" y="118" width="130" height="22" rx="8" stroke-width="1"/>
  <text x="410" y="133" text-anchor="middle" class="text-primary" font-size="9">"I want to sign up"</text>

  <!-- Arrow to agenda -->
  <line x1="490" y1="117" x2="555" y2="117" class="arrow" stroke-width="1.5"/>
  <polygon points="553,112 563,117 553,122" class="arrow"/>

  <!-- Agenda -->
  <rect class="box" x="565" y="42" width="215" height="150" rx="5" stroke-width="1.5"/>
  <text x="672" y="62" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Agenda Mode</text>

  <rect class="bubble" x="580" y="72" width="185" height="24" rx="10" stroke-width="1"/>
  <text x="672" y="88" text-anchor="middle" class="text-muted" font-size="9">Convey: "Let's get you set up"</text>

  <rect class="bubble" x="580" y="102" width="185" height="24" rx="10" stroke-width="1"/>
  <text x="672" y="118" text-anchor="middle" class="text-muted" font-size="9">Gather: name, email, plan</text>

  <rect class="bubble" x="580" y="132" width="185" height="24" rx="10" stroke-width="1"/>
  <text x="672" y="148" text-anchor="middle" class="text-muted" font-size="9">Debate: "Tell me your needs"</text>

  <text x="672" y="180" text-anchor="middle" class="text-muted" font-size="8">Structured, code-enforced</text>
</svg>
