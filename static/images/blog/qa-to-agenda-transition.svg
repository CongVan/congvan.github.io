<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: #2e2e33; stroke: #414244; }
      .box-qa { fill: #1e293b; stroke: #60a5fa; }
      .box-agenda { fill: #2d1b3d; stroke: #c084fc; }
      .bubble { fill: #2e2e33; stroke: #414244; }
      .text-primary { fill: #dadadb; }
      .text-secondary { fill: #9b9c9d; }
      .text-blue { fill: #60a5fa; }
      .text-purple { fill: #c084fc; }
      .arrow { stroke: #9b9c9d; fill: #9b9c9d; }
      .arrow-hl { stroke: #c084fc; fill: #c084fc; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f5f5f5; }
      .box { fill: #ffffff; stroke: #e0e0e0; }
      .box-qa { fill: #eff6ff; stroke: #2563eb; }
      .box-agenda { fill: #faf5ff; stroke: #7c3aed; }
      .bubble { fill: #ffffff; stroke: #e0e0e0; }
      .text-primary { fill: #1a1a1a; }
      .text-secondary { fill: #6b7280; }
      .text-blue { fill: #2563eb; }
      .text-purple { fill: #7c3aed; }
      .arrow { stroke: #9ca3af; fill: #9ca3af; }
      .arrow-hl { stroke: #7c3aed; fill: #7c3aed; }
    }
  </style>
  <rect class="bg" width="800" height="260" rx="8"/>
  <text x="400" y="28" text-anchor="middle" class="text-primary" font-size="14" font-weight="600">How Q&amp;A Mode Transitions to Agenda Mode</text>

  <!-- Q&A messages -->
  <rect class="box-qa" x="30" y="50" width="220" height="170" rx="6" stroke-width="2"/>
  <text x="140" y="72" text-anchor="middle" class="text-blue" font-size="11" font-weight="600">Q&amp;A MODE</text>

  <rect class="bubble" x="45" y="85" width="190" height="28" rx="12" stroke-width="1"/>
  <text x="140" y="103" text-anchor="middle" class="text-secondary" font-size="9">"What services do you offer?"</text>

  <rect class="bubble" x="45" y="120" width="190" height="28" rx="12" stroke-width="1"/>
  <text x="140" y="138" text-anchor="middle" class="text-secondary" font-size="9">"How much does it cost?"</text>

  <rect class="bubble" x="45" y="155" width="190" height="28" rx="12" stroke-width="1"/>
  <text x="140" y="173" text-anchor="middle" class="text-secondary" font-size="9">"Do you have a free trial?"</text>

  <text x="140" y="205" text-anchor="middle" class="text-secondary" font-size="8">Answered from knowledge base</text>

  <!-- Trigger arrow -->
  <line x1="250" y1="135" x2="310" y2="135" class="arrow-hl" stroke-width="2"/>
  <polygon points="308,130 318,135 308,140" class="arrow-hl"/>
  <text x="280" y="122" text-anchor="middle" class="text-purple" font-size="9" font-weight="500">TRIGGER</text>

  <!-- Trigger detection -->
  <rect class="box" x="320" y="90" width="180" height="90" rx="6" stroke-width="1.5"/>
  <text x="410" y="115" text-anchor="middle" class="text-primary" font-size="10" font-weight="500">Trigger Detection</text>
  <rect class="bubble" x="335" y="125" width="150" height="25" rx="10" stroke-width="1"/>
  <text x="410" y="142" text-anchor="middle" class="text-purple" font-size="9" font-weight="500">"I want to sign up"</text>
  <text x="410" y="168" text-anchor="middle" class="text-secondary" font-size="8">LLM tool call matches trigger</text>

  <!-- Arrow to agenda -->
  <line x1="500" y1="135" x2="555" y2="135" class="arrow-hl" stroke-width="2"/>
  <polygon points="553,130 563,135 553,140" class="arrow-hl"/>

  <!-- Agenda mode -->
  <rect class="box-agenda" x="565" y="50" width="215" height="170" rx="6" stroke-width="2"/>
  <text x="672" y="72" text-anchor="middle" class="text-purple" font-size="11" font-weight="600">AGENDA MODE</text>

  <rect class="bubble" x="580" y="85" width="185" height="28" rx="12" stroke-width="1"/>
  <text x="672" y="103" text-anchor="middle" class="text-secondary" font-size="9">Convey: "Let's get you set up!"</text>

  <rect class="bubble" x="580" y="120" width="185" height="28" rx="12" stroke-width="1"/>
  <text x="672" y="138" text-anchor="middle" class="text-secondary" font-size="9">Gather: name, email, plan</text>

  <rect class="bubble" x="580" y="155" width="185" height="28" rx="12" stroke-width="1"/>
  <text x="672" y="173" text-anchor="middle" class="text-secondary" font-size="9">Debate: "Tell me about your needs"</text>

  <text x="672" y="205" text-anchor="middle" class="text-secondary" font-size="8">Structured flow, code-enforced</text>

  <!-- Bottom labels -->
  <text x="140" y="245" text-anchor="middle" class="text-blue" font-size="9">User-led, knowledge-based</text>
  <text x="672" y="245" text-anchor="middle" class="text-purple" font-size="9">AI-led, deterministic</text>
</svg>
