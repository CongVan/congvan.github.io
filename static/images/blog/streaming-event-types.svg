<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="430" y="28" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">EventResponse — one stream, many event types</text>

  <!-- Root -->
  <rect class="box" x="330" y="55" width="200" height="50" rx="6" stroke-width="1.5"/>
  <text x="430" y="78" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">EventResponse</text>
  <text x="430" y="94" text-anchor="middle" class="text-muted" font-size="10">oneof event</text>

  <!-- Vertical trunk -->
  <line x1="430" y1="105" x2="430" y2="140" class="line" stroke-width="1.5"/>

  <!-- Horizontal branch bar -->
  <line x1="80" y1="140" x2="780" y2="140" class="line" stroke-width="1.5"/>

  <!-- 7 branches down -->
  <line x1="80" y1="140" x2="80" y2="170" class="line" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="200" y2="170" class="line" stroke-width="1.5"/>
  <line x1="320" y1="140" x2="320" y2="170" class="line" stroke-width="1.5"/>
  <line x1="440" y1="140" x2="440" y2="170" class="line" stroke-width="1.5"/>
  <line x1="555" y1="140" x2="555" y2="170" class="line" stroke-width="1.5"/>
  <line x1="670" y1="140" x2="670" y2="170" class="line" stroke-width="1.5"/>
  <line x1="780" y1="140" x2="780" y2="170" class="line" stroke-width="1.5"/>

  <!-- Event boxes (row 1) -->
  <rect class="box" x="20" y="170" width="120" height="70" rx="5" stroke-width="1.2"/>
  <text x="80" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">ChunkMessage</text>
  <text x="80" y="208" text-anchor="middle" class="text-muted" font-size="9">text token</text>
  <text x="80" y="224" text-anchor="middle" class="text-label" font-size="8">Day 3</text>

  <rect class="box" x="140" y="170" width="120" height="70" rx="5" stroke-width="1.2"/>
  <text x="200" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">Tool</text>
  <text x="200" y="208" text-anchor="middle" class="text-muted" font-size="9">LLM called fn</text>
  <text x="200" y="224" text-anchor="middle" class="text-label" font-size="8">Day 1</text>

  <rect class="box" x="260" y="170" width="120" height="70" rx="5" stroke-width="1.2"/>
  <text x="320" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">StartAgenda</text>
  <text x="320" y="208" text-anchor="middle" class="text-muted" font-size="9">agenda begins</text>
  <text x="320" y="224" text-anchor="middle" class="text-label" font-size="8">Day 1</text>

  <rect class="box" x="380" y="170" width="120" height="70" rx="5" stroke-width="1.2"/>
  <text x="440" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">StartAgendaItem</text>
  <text x="440" y="208" text-anchor="middle" class="text-muted" font-size="9">item starts</text>
  <text x="440" y="224" text-anchor="middle" class="text-label" font-size="8">Day 5, 6</text>

  <rect class="box" x="500" y="170" width="120" height="70" rx="5" stroke-width="1.2"/>
  <text x="560" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">EndAgendaItem</text>
  <text x="560" y="208" text-anchor="middle" class="text-muted" font-size="9">item done</text>
  <text x="560" y="224" text-anchor="middle" class="text-label" font-size="8">Day 6</text>

  <rect class="box" x="620" y="170" width="120" height="70" rx="5" stroke-width="1.2"/>
  <text x="680" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">EndAgenda</text>
  <text x="680" y="208" text-anchor="middle" class="text-muted" font-size="9">all done</text>
  <text x="680" y="224" text-anchor="middle" class="text-label" font-size="8">Day 11</text>

  <rect class="box" x="740" y="170" width="110" height="70" rx="5" stroke-width="1.2"/>
  <text x="795" y="192" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">Error</text>
  <text x="795" y="208" text-anchor="middle" class="text-muted" font-size="9">broken</text>
  <text x="795" y="224" text-anchor="middle" class="text-label" font-size="8">Day 3</text>

  <!-- Footer note -->
  <text x="430" y="290" text-anchor="middle" class="text-muted" font-size="10">Every event carries a conversation_id and a timestamp</text>
  <text x="430" y="308" text-anchor="middle" class="text-muted" font-size="10">One ordered log — no separate channels for text vs lifecycle</text>
  <text x="430" y="334" text-anchor="middle" class="text-label" font-size="9">(Day labels link to the post where each event type is detailed)</text>
</svg>
