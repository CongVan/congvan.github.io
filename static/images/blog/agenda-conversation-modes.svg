<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: none; stroke: #555; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .arrow { stroke: #888; fill: #888; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .box { fill: none; stroke: #ccc; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .arrow { stroke: #999; fill: #999; }
    }
  </style>
  <rect class="bg" width="800" height="240" rx="6"/>

  <text x="400" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Conversation Mode Transitions</text>

  <!-- QA -->
  <rect class="box" x="50" y="60" width="180" height="70" rx="6" stroke-width="1.5"/>
  <text x="140" y="90" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Q&amp;A Mode</text>
  <text x="140" y="108" text-anchor="middle" class="text-muted" font-size="10">User leads</text>

  <!-- Arrow -->
  <line x1="230" y1="95" x2="295" y2="95" class="arrow" stroke-width="1.5"/>
  <polygon points="293,90 303,95 293,100" class="arrow"/>
  <text x="262" y="85" text-anchor="middle" class="text-muted" font-size="9">trigger</text>

  <!-- Confirm -->
  <rect class="box" x="305" y="60" width="180" height="70" rx="6" stroke-width="1.5"/>
  <text x="395" y="90" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">Confirm</text>
  <text x="395" y="108" text-anchor="middle" class="text-muted" font-size="10">"Ready to start?"</text>

  <!-- Arrow -->
  <line x1="485" y1="95" x2="555" y2="95" class="arrow" stroke-width="1.5"/>
  <polygon points="553,90 563,95 553,100" class="arrow"/>
  <text x="520" y="85" text-anchor="middle" class="text-muted" font-size="9">yes</text>

  <!-- In Agenda -->
  <rect class="box" x="565" y="60" width="180" height="70" rx="6" stroke-width="1.5"/>
  <text x="655" y="90" text-anchor="middle" class="text-primary" font-size="12" font-weight="600">In Agenda</text>
  <text x="655" y="108" text-anchor="middle" class="text-muted" font-size="10">AI leads</text>

  <!-- Decline back -->
  <path d="M395 130 L395 170 L140 170 L140 130" class="arrow" stroke-width="1" fill="none" stroke-dasharray="5,4"/>
  <polygon points="135,132 140,122 145,132" class="arrow"/>
  <text x="268" y="165" text-anchor="middle" class="text-muted" font-size="9">decline / exit</text>

  <!-- Complete back -->
  <path d="M655 130 L655 200 L140 200 L140 130" class="arrow" stroke-width="1" fill="none" stroke-dasharray="5,4"/>
  <polygon points="135,132 140,122 145,132" class="arrow"/>
  <text x="398" y="195" text-anchor="middle" class="text-muted" font-size="9">complete</text>
</svg>
