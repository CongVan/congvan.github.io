<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-thick { fill: none; stroke: #888; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-thick { fill: none; stroke: #999; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Conditional Branching: Senior vs Junior Path</text>

  <!-- Common start -->
  <rect class="box" x="340" y="55" width="200" height="50" rx="5" stroke-width="1.3"/>
  <text x="350" y="73" class="text-label" font-size="9" font-weight="600">GATHER</text>
  <text x="440" y="93" text-anchor="middle" class="text-muted" font-size="10">years_experience, role_level</text>

  <line x1="440" y1="105" x2="440" y2="140" class="line" stroke-width="1.3"/>
  <polygon points="436,137 440,147 444,137" class="head"/>

  <!-- Diamond decision -->
  <path d="M440 150 L550 200 L440 250 L330 200 Z" class="box-thick" stroke-width="1.5"/>
  <text x="440" y="195" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Condition</text>
  <text x="440" y="212" text-anchor="middle" class="text-muted" font-size="9">years &gt;= 5</text>
  <text x="440" y="225" text-anchor="middle" class="text-muted" font-size="9">OR level == senior</text>

  <!-- True branch (right) -->
  <line x1="550" y1="200" x2="620" y2="200" class="line" stroke-width="1.3"/>
  <polygon points="618,196 628,200 618,204" class="head"/>
  <text x="585" y="190" text-anchor="middle" class="text-label" font-size="9">TRUE</text>

  <rect class="box" x="630" y="175" width="210" height="55" rx="5" stroke-width="1.3"/>
  <text x="640" y="193" class="text-label" font-size="9" font-weight="600">DEBATE</text>
  <text x="735" y="213" text-anchor="middle" class="text-muted" font-size="9">deep technical probe</text>
  <text x="735" y="225" text-anchor="middle" class="text-muted" font-size="9">(4 follow-up rounds)</text>

  <line x1="735" y1="230" x2="735" y2="290" class="line" stroke-width="1.3"/>
  <polygon points="731,287 735,297 739,287" class="head"/>

  <rect class="box" x="630" y="300" width="210" height="55" rx="5" stroke-width="1.3"/>
  <text x="640" y="318" class="text-label" font-size="9" font-weight="600">CONVEY</text>
  <text x="735" y="338" text-anchor="middle" class="text-muted" font-size="9">"Scheduling a call</text>
  <text x="735" y="350" text-anchor="middle" class="text-muted" font-size="9">with the hiring manager"</text>

  <!-- False branch (left) -->
  <line x1="330" y1="200" x2="260" y2="200" class="line" stroke-width="1.3"/>
  <polygon points="262,196 252,200 262,204" class="head"/>
  <text x="295" y="190" text-anchor="middle" class="text-label" font-size="9">FALSE</text>

  <rect class="box" x="40" y="175" width="210" height="55" rx="5" stroke-width="1.3"/>
  <text x="50" y="193" class="text-label" font-size="9" font-weight="600">GATHER</text>
  <text x="145" y="213" text-anchor="middle" class="text-muted" font-size="9">portfolio_url,</text>
  <text x="145" y="225" text-anchor="middle" class="text-muted" font-size="9">years_in_school</text>

  <line x1="145" y1="230" x2="145" y2="290" class="line" stroke-width="1.3"/>
  <polygon points="141,287 145,297 149,287" class="head"/>

  <rect class="box" x="40" y="300" width="210" height="55" rx="5" stroke-width="1.3"/>
  <text x="50" y="318" class="text-label" font-size="9" font-weight="600">CONVEY</text>
  <text x="145" y="338" text-anchor="middle" class="text-muted" font-size="9">"We'll review and get back</text>
  <text x="145" y="350" text-anchor="middle" class="text-muted" font-size="9">to you in 5 business days"</text>

  <!-- Footer note -->
  <text x="440" y="390" text-anchor="middle" class="text-muted" font-size="9">Each branch skips ahead to the next item whose condition is true</text>
</svg>
