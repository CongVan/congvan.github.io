<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: none; stroke: #555; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .arrow { stroke: #888; fill: #888; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .box { fill: none; stroke: #ccc; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .arrow { stroke: #999; fill: #999; }
    }
  </style>
  <rect class="bg" width="520" height="440" rx="6"/>

  <text x="260" y="28" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Agenda Item Execution</text>

  <rect class="box" x="140" y="45" width="240" height="40" rx="5" stroke-width="1.5"/>
  <text x="260" y="70" text-anchor="middle" class="text-primary" font-size="11">1. Evaluate condition</text>
  <text x="410" y="68" class="text-muted" font-size="9">false → skip</text>

  <line x1="260" y1="85" x2="260" y2="105" class="arrow" stroke-width="1.5"/>
  <polygon points="255,102 260,110 265,102" class="arrow"/>

  <rect class="box" x="140" y="110" width="240" height="40" rx="5" stroke-width="1.5"/>
  <text x="260" y="135" text-anchor="middle" class="text-primary" font-size="11">2. Pre-populate from context</text>

  <line x1="260" y1="150" x2="260" y2="170" class="arrow" stroke-width="1.5"/>
  <polygon points="255,167 260,175 265,167" class="arrow"/>

  <rect class="box" x="140" y="175" width="240" height="50" rx="5" stroke-width="1.5"/>
  <text x="260" y="198" text-anchor="middle" class="text-primary" font-size="11">3. Execute item</text>
  <text x="260" y="214" text-anchor="middle" class="text-muted" font-size="9">Convey | Gather | Debate | Q&amp;A</text>

  <line x1="260" y1="225" x2="260" y2="245" class="arrow" stroke-width="1.5"/>
  <polygon points="255,242 260,250 265,242" class="arrow"/>

  <rect class="box" x="140" y="250" width="240" height="40" rx="5" stroke-width="1.5"/>
  <text x="260" y="275" text-anchor="middle" class="text-primary" font-size="11">4. Extract outputs</text>

  <line x1="260" y1="290" x2="260" y2="310" class="arrow" stroke-width="1.5"/>
  <polygon points="255,307 260,315 265,307" class="arrow"/>

  <rect class="box" x="140" y="315" width="240" height="40" rx="5" stroke-width="1.5"/>
  <text x="260" y="340" text-anchor="middle" class="text-primary" font-size="11">5. Save to Redis + DB</text>

  <line x1="260" y1="355" x2="260" y2="375" class="arrow" stroke-width="1.5"/>
  <polygon points="255,372 260,380 265,372" class="arrow"/>

  <rect class="box" x="195" y="380" width="130" height="35" rx="17" stroke-width="1.5"/>
  <text x="260" y="402" text-anchor="middle" class="text-primary" font-size="11">Next item</text>
</svg>
