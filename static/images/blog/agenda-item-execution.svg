<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: #2e2e33; stroke: #414244; }
      .box-highlight { fill: #1e293b; stroke: #6c9eff; }
      .box-skip { fill: #2e2e33; stroke: #f59e0b; }
      .box-end { fill: #1a2e1a; stroke: #4ade80; }
      .text-primary { fill: #dadadb; }
      .text-secondary { fill: #9b9c9d; }
      .text-highlight { fill: #6c9eff; }
      .text-warn { fill: #f59e0b; }
      .text-success { fill: #4ade80; }
      .arrow { stroke: #9b9c9d; }
      .line { stroke: #414244; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f5f5f5; }
      .box { fill: #ffffff; stroke: #e0e0e0; }
      .box-highlight { fill: #eff6ff; stroke: #2563eb; }
      .box-skip { fill: #fffbeb; stroke: #d97706; }
      .box-end { fill: #f0fdf4; stroke: #16a34a; }
      .text-primary { fill: #1a1a1a; }
      .text-secondary { fill: #6b7280; }
      .text-highlight { fill: #2563eb; }
      .text-warn { fill: #d97706; }
      .text-success { fill: #16a34a; }
      .arrow { stroke: #9ca3af; }
      .line { stroke: #e0e0e0; }
    }
  </style>
  <rect class="bg" width="800" height="520" rx="8"/>

  <text x="400" y="35" text-anchor="middle" class="text-primary" font-size="15" font-weight="600">Agenda Item Execution Flow</text>

  <!-- Step 1: Evaluate Condition -->
  <rect class="box-highlight" x="275" y="55" width="250" height="50" rx="6" stroke-width="2"/>
  <text x="400" y="78" text-anchor="middle" class="text-primary" font-size="12" font-weight="500">1. Evaluate Condition</text>
  <text x="400" y="95" text-anchor="middle" class="text-secondary" font-size="10">AI or JSON logic check</text>

  <!-- Skip branch -->
  <line x1="525" y1="80" x2="680" y2="80" class="arrow" stroke-width="1.5"/>
  <text x="600" y="73" text-anchor="middle" class="text-warn" font-size="10">false</text>
  <rect class="box-skip" x="680" y="60" width="100" height="40" rx="6" stroke-width="1.5"/>
  <text x="730" y="84" text-anchor="middle" class="text-warn" font-size="11" font-weight="500">Skip Item</text>

  <!-- Arrow down from condition -->
  <line x1="400" y1="105" x2="400" y2="135" class="arrow" stroke-width="1.5"/>
  <polygon points="395,130 400,140 405,130" class="arrow" fill="currentColor" style="fill: inherit; stroke: none;"/>
  <text x="415" y="123" class="text-highlight" font-size="10">true</text>

  <!-- Step 2: Pre-populate -->
  <rect class="box" x="275" y="140" width="250" height="50" rx="6" stroke-width="1.5"/>
  <text x="400" y="163" text-anchor="middle" class="text-primary" font-size="12" font-weight="500">2. Pre-populate from Context</text>
  <text x="400" y="180" text-anchor="middle" class="text-secondary" font-size="10">Auto-fill from last 20 messages</text>

  <!-- Arrow -->
  <line x1="400" y1="190" x2="400" y2="220" class="arrow" stroke-width="1.5"/>
  <polygon points="395,215 400,225 405,215" class="arrow" fill="currentColor" style="fill: inherit; stroke: none;"/>

  <!-- Step 3: Execute -->
  <rect class="box-highlight" x="275" y="225" width="250" height="65" rx="6" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" class="text-primary" font-size="12" font-weight="500">3. Execute Item</text>
  <text x="400" y="268" text-anchor="middle" class="text-secondary" font-size="10">Convey | Gather | Debate | Q&amp;A</text>
  <text x="400" y="282" text-anchor="middle" class="text-secondary" font-size="10">(multiple conversation turns)</text>

  <!-- Arrow -->
  <line x1="400" y1="290" x2="400" y2="320" class="arrow" stroke-width="1.5"/>
  <polygon points="395,315 400,325 405,315" class="arrow" fill="currentColor" style="fill: inherit; stroke: none;"/>

  <!-- Step 4: Extract -->
  <rect class="box" x="275" y="325" width="250" height="50" rx="6" stroke-width="1.5"/>
  <text x="400" y="348" text-anchor="middle" class="text-primary" font-size="12" font-weight="500">4. Extract Outputs</text>
  <text x="400" y="365" text-anchor="middle" class="text-secondary" font-size="10">Asked + Inferred data</text>

  <!-- Arrow to save -->
  <line x1="400" y1="375" x2="400" y2="405" class="arrow" stroke-width="1.5"/>
  <polygon points="395,400 400,410 405,400" class="arrow" fill="currentColor" style="fill: inherit; stroke: none;"/>

  <!-- Step 5: Save -->
  <rect class="box" x="275" y="410" width="250" height="50" rx="6" stroke-width="1.5"/>
  <text x="400" y="433" text-anchor="middle" class="text-primary" font-size="12" font-weight="500">5. Save to Redis + PostgreSQL</text>
  <text x="400" y="450" text-anchor="middle" class="text-secondary" font-size="10">State persisted for resume</text>

  <!-- Arrow to next -->
  <line x1="400" y1="460" x2="400" y2="490" class="arrow" stroke-width="1.5"/>
  <polygon points="395,485 400,495 405,485" class="arrow" fill="currentColor" style="fill: inherit; stroke: none;"/>

  <!-- Next item / End -->
  <rect class="box-end" x="300" y="495" width="100" height="30" rx="15" stroke-width="1.5"/>
  <text x="350" y="514" text-anchor="middle" class="text-success" font-size="11" font-weight="500">Next Item</text>
  <text x="420" y="514" class="text-secondary" font-size="10">or End Agenda</text>

  <!-- Skip arrow reconnects -->
  <path d="M730 100 L730 500 L410 500" class="arrow" stroke-width="1.5" fill="none" stroke-dasharray="5,4"/>
</svg>
