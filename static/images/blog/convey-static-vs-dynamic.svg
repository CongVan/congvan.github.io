<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 340" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-thick { fill: none; stroke: #888; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-thick { fill: none; stroke: #999; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Convey Item: Static vs Dynamic</text>

  <!-- STATIC side -->
  <text x="220" y="65" text-anchor="middle" class="text-label" font-size="11" font-weight="700">STATIC</text>

  <rect class="box" x="60" y="80" width="320" height="55" rx="5" stroke-width="1.3"/>
  <text x="220" y="102" text-anchor="middle" class="text-primary" font-size="10">Frontmatter stores exact text</text>
  <text x="220" y="120" text-anchor="middle" class="text-muted" font-size="9">"Thanks for applying. We'll review in 3 days."</text>

  <line x1="220" y1="135" x2="220" y2="160" class="line" stroke-width="1.3"/>
  <polygon points="216,157 220,167 224,157" class="head"/>

  <rect class="box" x="80" y="170" width="280" height="45" rx="5" stroke-width="1.3"/>
  <text x="220" y="190" text-anchor="middle" class="text-primary" font-size="10">Render placeholders</text>
  <text x="220" y="205" text-anchor="middle" class="text-muted" font-size="9">{{ user_name }} → "Jane"</text>

  <line x1="220" y1="215" x2="220" y2="240" class="line" stroke-width="1.3"/>
  <polygon points="216,237 220,247 224,237" class="head"/>

  <rect class="box-thick" x="60" y="250" width="320" height="55" rx="5" stroke-width="1.5"/>
  <text x="220" y="272" text-anchor="middle" class="text-primary" font-size="10">Emit as single message</text>
  <text x="220" y="290" text-anchor="middle" class="text-muted" font-size="9">no LLM call — instant, zero tokens</text>

  <!-- DYNAMIC side -->
  <text x="660" y="65" text-anchor="middle" class="text-label" font-size="11" font-weight="700">DYNAMIC</text>

  <rect class="box" x="500" y="80" width="320" height="55" rx="5" stroke-width="1.3"/>
  <text x="660" y="102" text-anchor="middle" class="text-primary" font-size="10">Frontmatter stores a prompt</text>
  <text x="660" y="120" text-anchor="middle" class="text-muted" font-size="9">"Summarize the candidate's strongest points"</text>

  <line x1="660" y1="135" x2="660" y2="160" class="line" stroke-width="1.3"/>
  <polygon points="656,157 660,167 664,157" class="head"/>

  <rect class="box" x="520" y="170" width="280" height="45" rx="5" stroke-width="1.3"/>
  <text x="660" y="190" text-anchor="middle" class="text-primary" font-size="10">Inject context + outputs</text>
  <text x="660" y="205" text-anchor="middle" class="text-muted" font-size="9">prior Gather + Debate outputs</text>

  <line x1="660" y1="215" x2="660" y2="240" class="line" stroke-width="1.3"/>
  <polygon points="656,237 660,247 664,237" class="head"/>

  <rect class="box-thick" x="500" y="250" width="320" height="55" rx="5" stroke-width="1.5"/>
  <text x="660" y="272" text-anchor="middle" class="text-primary" font-size="10">LLM generates + streams chunks</text>
  <text x="660" y="290" text-anchor="middle" class="text-muted" font-size="9">personalized — costs tokens</text>

  <text x="440" y="325" text-anchor="middle" class="text-muted" font-size="9">Both modes end with one outgoing message; the item completes immediately after</text>
</svg>
