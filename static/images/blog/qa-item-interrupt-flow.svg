<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-pause { fill: none; stroke: #888; stroke-dasharray: 4 3; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-pause { fill: none; stroke: #bbb; stroke-dasharray: 4 3; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Q&amp;A Item: Interrupt and Resume</text>

  <!-- Top row: agenda items in sequence -->
  <rect class="box" x="40" y="70" width="150" height="55" rx="5" stroke-width="1.3"/>
  <text x="50" y="88" class="text-label" font-size="9" font-weight="600">CONVEY</text>
  <text x="115" y="108" text-anchor="middle" class="text-muted" font-size="9">"Welcome to Pizza X"</text>

  <line x1="190" y1="97" x2="215" y2="97" class="line" stroke-width="1.3"/>
  <polygon points="213,93 220,97 213,101" class="head"/>

  <rect class="box" x="220" y="70" width="150" height="55" rx="5" stroke-width="1.3"/>
  <text x="230" y="88" class="text-label" font-size="9" font-weight="600">GATHER</text>
  <text x="295" y="108" text-anchor="middle" class="text-muted" font-size="9">size, toppings, address</text>

  <line x1="370" y1="97" x2="395" y2="97" class="line" stroke-width="1.3"/>
  <polygon points="393,93 400,97 393,101" class="head"/>

  <!-- Currently executing (thick border) -->
  <rect class="box" x="400" y="70" width="150" height="55" rx="5" stroke-width="2.5"/>
  <text x="410" y="88" class="text-label" font-size="9" font-weight="600">GATHER (active)</text>
  <text x="475" y="108" text-anchor="middle" class="text-muted" font-size="9">asking for address</text>

  <line x1="550" y1="97" x2="575" y2="97" class="line" stroke-width="1.3"/>
  <polygon points="573,93 580,97 573,101" class="head"/>

  <rect class="box" x="580" y="70" width="150" height="55" rx="5" stroke-width="1.3"/>
  <text x="590" y="88" class="text-label" font-size="9" font-weight="600">CONVEY</text>
  <text x="655" y="108" text-anchor="middle" class="text-muted" font-size="9">order summary</text>

  <line x1="730" y1="97" x2="755" y2="97" class="line" stroke-width="1.3"/>
  <polygon points="753,93 760,97 753,101" class="head"/>

  <rect class="box" x="760" y="70" width="100" height="55" rx="5" stroke-width="1.3"/>
  <text x="810" y="88" text-anchor="middle" class="text-label" font-size="9" font-weight="600">END</text>
  <text x="810" y="108" text-anchor="middle" class="text-muted" font-size="9">pay + dispatch</text>

  <!-- Vertical pause arrow down from active item -->
  <line x1="475" y1="125" x2="475" y2="165" class="line" stroke-width="1.5" stroke-dasharray="3 3"/>
  <polygon points="471,162 475,172 479,162" class="head"/>
  <text x="485" y="150" class="text-muted" font-size="9">user asks off-topic →</text>

  <!-- Q&A interrupt box -->
  <rect class="box-pause" x="290" y="175" width="370" height="100" rx="5" stroke-width="1.5"/>
  <text x="475" y="198" text-anchor="middle" class="text-label" font-size="11" font-weight="600">Q&amp;A ITEM (paused agenda)</text>
  <text x="475" y="218" text-anchor="middle" class="text-muted" font-size="9">"Wait — are you open tonight?"</text>
  <text x="475" y="235" text-anchor="middle" class="text-muted" font-size="9">"Do you deliver to District 2?"</text>
  <text x="475" y="252" text-anchor="middle" class="text-muted" font-size="9">"What's your cancellation policy?"</text>
  <text x="475" y="267" text-anchor="middle" class="text-muted" font-size="8">answered from knowledge base</text>

  <!-- Resume arrow back up -->
  <path d="M660 225 Q740 225 740 160 Q740 110 555 103" class="line" stroke-width="1.5" stroke-dasharray="3 3"/>
  <polygon points="557,99 549,103 557,107" class="head"/>
  <text x="745" y="165" text-anchor="start" class="text-muted" font-size="9">user done →</text>
  <text x="745" y="180" text-anchor="start" class="text-muted" font-size="9">resume at</text>
  <text x="745" y="195" text-anchor="start" class="text-muted" font-size="9">the same item</text>

  <!-- Bottom note -->
  <text x="440" y="320" text-anchor="middle" class="text-muted" font-size="10">Agenda state, collected outputs, and current field position are preserved across the pause</text>
  <text x="440" y="338" text-anchor="middle" class="text-muted" font-size="10">The Gather item resumes exactly where it left off — no re-asking, no data loss</text>
</svg>
