<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-thick { fill: none; stroke: #888; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-thick { fill: none; stroke: #999; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Four Channels, One Conversation Engine</text>

  <!-- Top: 4 channel sources -->
  <rect class="box" x="30" y="60" width="180" height="60" rx="5" stroke-width="1.3"/>
  <text x="120" y="85" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Webchat</text>
  <text x="120" y="103" text-anchor="middle" class="text-muted" font-size="9">brand.example.com</text>

  <rect class="box" x="230" y="60" width="180" height="60" rx="5" stroke-width="1.3"/>
  <text x="320" y="85" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Widget</text>
  <text x="320" y="103" text-anchor="middle" class="text-muted" font-size="9">embed on any site</text>

  <rect class="box" x="430" y="60" width="180" height="60" rx="5" stroke-width="1.3"/>
  <text x="520" y="85" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">WhatsApp</text>
  <text x="520" y="103" text-anchor="middle" class="text-muted" font-size="9">Business API webhook</text>

  <rect class="box" x="630" y="60" width="180" height="60" rx="5" stroke-width="1.3"/>
  <text x="720" y="85" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Messenger</text>
  <text x="720" y="103" text-anchor="middle" class="text-muted" font-size="9">FB Pages webhook</text>

  <!-- Arrows down to adapters -->
  <line x1="120" y1="120" x2="120" y2="155" class="line" stroke-width="1.3"/>
  <polygon points="116,152 120,162 124,152" class="head"/>
  <line x1="320" y1="120" x2="320" y2="155" class="line" stroke-width="1.3"/>
  <polygon points="316,152 320,162 324,152" class="head"/>
  <line x1="520" y1="120" x2="520" y2="155" class="line" stroke-width="1.3"/>
  <polygon points="516,152 520,162 524,152" class="head"/>
  <line x1="720" y1="120" x2="720" y2="155" class="line" stroke-width="1.3"/>
  <polygon points="716,152 720,162 724,152" class="head"/>

  <!-- Adapter row -->
  <rect class="box" x="30" y="165" width="180" height="50" rx="5" stroke-width="1.3"/>
  <text x="120" y="187" text-anchor="middle" class="text-muted" font-size="10">Webchat Adapter</text>
  <text x="120" y="203" text-anchor="middle" class="text-muted" font-size="9">SSE + REST</text>

  <rect class="box" x="230" y="165" width="180" height="50" rx="5" stroke-width="1.3"/>
  <text x="320" y="187" text-anchor="middle" class="text-muted" font-size="10">Widget Adapter</text>
  <text x="320" y="203" text-anchor="middle" class="text-muted" font-size="9">script tag + iframe</text>

  <rect class="box" x="430" y="165" width="180" height="50" rx="5" stroke-width="1.3"/>
  <text x="520" y="187" text-anchor="middle" class="text-muted" font-size="10">WhatsApp Adapter</text>
  <text x="520" y="203" text-anchor="middle" class="text-muted" font-size="9">webhook + 24h window</text>

  <rect class="box" x="630" y="165" width="180" height="50" rx="5" stroke-width="1.3"/>
  <text x="720" y="187" text-anchor="middle" class="text-muted" font-size="10">Messenger Adapter</text>
  <text x="720" y="203" text-anchor="middle" class="text-muted" font-size="9">webhook + Page API</text>

  <!-- Arrows down to engine -->
  <line x1="120" y1="215" x2="350" y2="270" class="line" stroke-width="1.3"/>
  <line x1="320" y1="215" x2="400" y2="270" class="line" stroke-width="1.3"/>
  <line x1="520" y1="215" x2="480" y2="270" class="line" stroke-width="1.3"/>
  <line x1="720" y1="215" x2="540" y2="270" class="line" stroke-width="1.3"/>

  <!-- Engine box -->
  <rect class="box-thick" x="280" y="275" width="320" height="60" rx="5" stroke-width="1.5"/>
  <text x="440" y="298" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Conversation Engine</text>
  <text x="440" y="318" text-anchor="middle" class="text-muted" font-size="9">unified message format → Agenda Engine → Redis</text>

  <!-- Bottom note -->
  <text x="440" y="367" text-anchor="middle" class="text-muted" font-size="10">Adapters normalize each channel's quirks (multi-message grouping, attachments, presence)</text>
  <text x="440" y="385" text-anchor="middle" class="text-muted" font-size="10">into a single message format the engine doesn't have to know channels exist</text>
</svg>
