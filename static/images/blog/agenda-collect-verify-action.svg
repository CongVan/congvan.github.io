<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: none; stroke: #555; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .arrow { stroke: #888; fill: #888; }
      .bullet { fill: #888; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .box { fill: none; stroke: #ccc; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .arrow { stroke: #999; fill: #999; }
      .bullet { fill: #999; }
    }
  </style>
  <rect class="bg" width="800" height="240" rx="6"/>

  <text x="400" y="28" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Collect → Verify → Action</text>

  <!-- Collect -->
  <rect class="box" x="30" y="48" width="230" height="170" rx="6" stroke-width="1.5"/>
  <text x="145" y="72" text-anchor="middle" class="text-primary" font-size="13" font-weight="700">COLLECT</text>
  <circle class="bullet" cx="52" cy="98" r="2"/>
  <text x="62" y="102" class="text-muted" font-size="10">Gather: ask + validate</text>
  <circle class="bullet" cx="52" cy="118" r="2"/>
  <text x="62" y="122" class="text-muted" font-size="10">Debate: explore + probe</text>
  <circle class="bullet" cx="52" cy="138" r="2"/>
  <text x="62" y="142" class="text-muted" font-size="10">Asked outputs (explicit)</text>
  <circle class="bullet" cx="52" cy="158" r="2"/>
  <text x="62" y="162" class="text-muted" font-size="10">Inferred outputs (AI)</text>
  <text x="145" y="200" text-anchor="middle" class="text-muted" font-size="9">Redis + PostgreSQL</text>

  <!-- Arrow -->
  <line x1="260" y1="133" x2="285" y2="133" class="arrow" stroke-width="2"/>
  <polygon points="283,128 292,133 283,138" class="arrow"/>

  <!-- Verify -->
  <rect class="box" x="290" y="48" width="220" height="170" rx="6" stroke-width="1.5"/>
  <text x="400" y="72" text-anchor="middle" class="text-primary" font-size="13" font-weight="700">VERIFY</text>
  <circle class="bullet" cx="310" cy="98" r="2"/>
  <text x="320" y="102" class="text-muted" font-size="10">Regex validation</text>
  <circle class="bullet" cx="310" cy="118" r="2"/>
  <text x="320" y="122" class="text-muted" font-size="10">User confirmation</text>
  <circle class="bullet" cx="310" cy="138" r="2"/>
  <text x="320" y="142" class="text-muted" font-size="10">Re-prompt on failure</text>
  <circle class="bullet" cx="310" cy="158" r="2"/>
  <text x="320" y="162" class="text-muted" font-size="10">Stale threshold (3x)</text>
  <text x="400" y="200" text-anchor="middle" class="text-muted" font-size="9">Prevents bad data</text>

  <!-- Arrow -->
  <line x1="510" y1="133" x2="540" y2="133" class="arrow" stroke-width="2"/>
  <polygon points="538,128 547,133 538,138" class="arrow"/>

  <!-- Action -->
  <rect class="box" x="545" y="48" width="230" height="170" rx="6" stroke-width="1.5"/>
  <text x="660" y="72" text-anchor="middle" class="text-primary" font-size="13" font-weight="700">ACTION</text>
  <circle class="bullet" cx="565" cy="98" r="2"/>
  <text x="575" y="102" class="text-muted" font-size="10">Webhook (Zapier, API)</text>
  <circle class="bullet" cx="565" cy="118" r="2"/>
  <text x="575" y="122" class="text-muted" font-size="10">CRM (HubSpot)</text>
  <circle class="bullet" cx="565" cy="138" r="2"/>
  <text x="575" y="142" class="text-muted" font-size="10">Google Sheets</text>
  <circle class="bullet" cx="565" cy="158" r="2"/>
  <text x="575" y="162" class="text-muted" font-size="10">Email confirmation</text>
  <text x="660" y="200" text-anchor="middle" class="text-muted" font-size="9">On agenda completion</text>
</svg>
