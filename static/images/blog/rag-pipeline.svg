<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #1d1e20; }
      .box { fill: none; stroke: #555; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .arrow { stroke: #888; fill: #888; }
      .divider { stroke: #444; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #fafafa; }
      .box { fill: none; stroke: #ccc; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #666; }
      .arrow { stroke: #999; fill: #999; }
      .divider { stroke: #ddd; }
    }
  </style>
  <rect class="bg" width="800" height="280" rx="6"/>
  <text x="400" y="25" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">RAG Pipeline</text>

  <!-- Row 1 -->
  <text x="40" y="52" class="text-label" font-size="10" font-weight="600">INGESTION (async)</text>

  <rect class="box" x="40" y="60" width="115" height="45" rx="4" stroke-width="1.5"/>
  <text x="97" y="80" text-anchor="middle" class="text-primary" font-size="10">Upload</text>
  <text x="97" y="94" text-anchor="middle" class="text-muted" font-size="8">PDF, Docs, CSV</text>

  <line x1="155" y1="82" x2="182" y2="82" class="arrow" stroke-width="1"/>
  <polygon points="180,78 187,82 180,86" class="arrow"/>

  <rect class="box" x="190" y="60" width="115" height="45" rx="4" stroke-width="1.5"/>
  <text x="247" y="80" text-anchor="middle" class="text-primary" font-size="10">Queue</text>
  <text x="247" y="94" text-anchor="middle" class="text-muted" font-size="8">BullMQ job</text>

  <line x1="305" y1="82" x2="332" y2="82" class="arrow" stroke-width="1"/>
  <polygon points="330,78 337,82 330,86" class="arrow"/>

  <rect class="box" x="340" y="60" width="115" height="45" rx="4" stroke-width="1.5"/>
  <text x="397" y="80" text-anchor="middle" class="text-primary" font-size="10">Chunk</text>
  <text x="397" y="94" text-anchor="middle" class="text-muted" font-size="8">Split by paragraph</text>

  <line x1="455" y1="82" x2="482" y2="82" class="arrow" stroke-width="1"/>
  <polygon points="480,78 487,82 480,86" class="arrow"/>

  <rect class="box" x="490" y="60" width="115" height="45" rx="4" stroke-width="1.5"/>
  <text x="547" y="80" text-anchor="middle" class="text-primary" font-size="10">Embed</text>
  <text x="547" y="94" text-anchor="middle" class="text-muted" font-size="8">OpenAI vectors</text>

  <line x1="605" y1="82" x2="632" y2="82" class="arrow" stroke-width="1"/>
  <polygon points="630,78 637,82 630,86" class="arrow"/>

  <rect class="box" x="640" y="60" width="130" height="45" rx="4" stroke-width="1.5"/>
  <text x="705" y="80" text-anchor="middle" class="text-primary" font-size="10">Vector DB</text>
  <text x="705" y="94" text-anchor="middle" class="text-muted" font-size="8">Pinecone</text>

  <!-- Divider -->
  <line x1="40" y1="125" x2="770" y2="125" class="divider" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Row 2 -->
  <text x="40" y="150" class="text-label" font-size="10" font-weight="600">RETRIEVAL (per message)</text>

  <rect class="box" x="40" y="158" width="130" height="45" rx="4" stroke-width="1.5"/>
  <text x="105" y="178" text-anchor="middle" class="text-primary" font-size="10">User question</text>
  <text x="105" y="192" text-anchor="middle" class="text-muted" font-size="8">"What's your pricing?"</text>

  <line x1="170" y1="180" x2="202" y2="180" class="arrow" stroke-width="1"/>
  <polygon points="200,176 207,180 200,184" class="arrow"/>

  <rect class="box" x="210" y="158" width="120" height="45" rx="4" stroke-width="1.5"/>
  <text x="270" y="178" text-anchor="middle" class="text-primary" font-size="10">Rewrite query</text>
  <text x="270" y="192" text-anchor="middle" class="text-muted" font-size="8">Optimize for search</text>

  <line x1="330" y1="180" x2="362" y2="180" class="arrow" stroke-width="1"/>
  <polygon points="360,176 367,180 360,184" class="arrow"/>

  <rect class="box" x="370" y="158" width="120" height="45" rx="4" stroke-width="1.5"/>
  <text x="430" y="178" text-anchor="middle" class="text-primary" font-size="10">Vector search</text>
  <text x="430" y="192" text-anchor="middle" class="text-muted" font-size="8">Similarity match</text>

  <line x1="490" y1="180" x2="522" y2="180" class="arrow" stroke-width="1"/>
  <polygon points="520,176 527,180 520,184" class="arrow"/>

  <rect class="box" x="530" y="158" width="100" height="45" rx="4" stroke-width="1.5"/>
  <text x="580" y="178" text-anchor="middle" class="text-primary" font-size="10">Rank + filter</text>
  <text x="580" y="192" text-anchor="middle" class="text-muted" font-size="8">Scope, language</text>

  <line x1="630" y1="180" x2="652" y2="180" class="arrow" stroke-width="1"/>
  <polygon points="650,176 657,180 650,184" class="arrow"/>

  <rect class="box" x="660" y="158" width="110" height="45" rx="4" stroke-width="1.5"/>
  <text x="715" y="178" text-anchor="middle" class="text-primary" font-size="10">LLM answer</text>
  <text x="715" y="192" text-anchor="middle" class="text-muted" font-size="8">With context</text>

  <!-- Footer -->
  <text x="400" y="235" text-anchor="middle" class="text-muted" font-size="9">Documents scoped per agent — some sources only available in specific agendas or channels</text>
  <text x="400" y="252" text-anchor="middle" class="text-muted" font-size="9">Auto-sync: webpages and live sources re-embed on schedule</text>
</svg>
