<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-thick { fill: none; stroke: #888; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-thick { fill: none; stroke: #999; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Agenda State Machine: 8 Events</text>

  <!-- QA state -->
  <rect class="box" x="60" y="70" width="160" height="60" rx="5" stroke-width="1.5"/>
  <text x="140" y="95" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Q&amp;A mode</text>
  <text x="140" y="115" text-anchor="middle" class="text-muted" font-size="9">user leads, no agenda</text>

  <!-- Arrow: select-agenda -->
  <line x1="220" y1="100" x2="290" y2="100" class="line" stroke-width="1.3"/>
  <polygon points="288,96 296,100 288,104" class="head"/>
  <text x="255" y="92" text-anchor="middle" class="text-label" font-size="9">select-agenda</text>

  <!-- Confirm state -->
  <rect class="box" x="300" y="70" width="160" height="60" rx="5" stroke-width="1.5"/>
  <text x="380" y="95" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">Confirm</text>
  <text x="380" y="115" text-anchor="middle" class="text-muted" font-size="9">"ready to start?"</text>

  <!-- Arrow: start-agenda -->
  <line x1="460" y1="100" x2="530" y2="100" class="line" stroke-width="1.3"/>
  <polygon points="528,96 536,100 528,104" class="head"/>
  <text x="495" y="92" text-anchor="middle" class="text-label" font-size="9">start-agenda</text>

  <!-- In-agenda state -->
  <rect class="box-thick" x="540" y="70" width="200" height="60" rx="5" stroke-width="1.5"/>
  <text x="640" y="95" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">In Agenda</text>
  <text x="640" y="115" text-anchor="middle" class="text-muted" font-size="9">items running</text>

  <!-- Self-loop on In Agenda for item events -->
  <path d="M740 85 Q820 60 820 100 Q820 140 740 115" class="line" stroke-width="1.3"/>
  <polygon points="744,118 736,118 740,124" class="head"/>
  <text x="830" y="95" text-anchor="start" class="text-label" font-size="9">start-item</text>
  <text x="830" y="108" text-anchor="start" class="text-label" font-size="9">update-item</text>
  <text x="830" y="121" text-anchor="start" class="text-label" font-size="9">end-item</text>

  <!-- Down arrow from In Agenda for end / exit / timeout -->
  <line x1="640" y1="130" x2="640" y2="200" class="line" stroke-width="1.3"/>
  <polygon points="636,197 640,207 644,197" class="head"/>

  <!-- Three terminal events -->
  <rect class="box" x="200" y="220" width="160" height="50" rx="5" stroke-width="1.3"/>
  <text x="280" y="240" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">end-agenda</text>
  <text x="280" y="258" text-anchor="middle" class="text-muted" font-size="9">all items complete</text>

  <rect class="box" x="380" y="220" width="160" height="50" rx="5" stroke-width="1.3"/>
  <text x="460" y="240" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">exit-agenda</text>
  <text x="460" y="258" text-anchor="middle" class="text-muted" font-size="9">user quit early</text>

  <rect class="box" x="560" y="220" width="160" height="50" rx="5" stroke-width="1.3"/>
  <text x="640" y="240" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">timeout</text>
  <text x="640" y="258" text-anchor="middle" class="text-muted" font-size="9">no activity for X min</text>

  <!-- Lines connecting to those -->
  <line x1="640" y1="200" x2="280" y2="220" class="line" stroke-width="1.3" stroke-dasharray="3 3"/>
  <line x1="640" y1="200" x2="460" y2="220" class="line" stroke-width="1.3" stroke-dasharray="3 3"/>
  <line x1="640" y1="200" x2="640" y2="220" class="line" stroke-width="1.3" stroke-dasharray="3 3"/>

  <!-- Resume event going back to In Agenda -->
  <path d="M540 100 Q400 200 220 100" class="line" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="380" y="170" text-anchor="middle" class="text-label" font-size="9">resume-agenda (after Q&amp;A interrupt)</text>

  <!-- Down to write-state -->
  <line x1="380" y1="280" x2="380" y2="320" class="line" stroke-width="1.3"/>
  <polygon points="376,317 380,327 384,317" class="head"/>

  <rect class="box" x="220" y="330" width="320" height="50" rx="5" stroke-width="1.3"/>
  <text x="380" y="352" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">Write to Redis + Postgres flush</text>
  <text x="380" y="368" text-anchor="middle" class="text-muted" font-size="9">terminal — durable record + webhook fires</text>
</svg>
