<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 280" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .bubble { fill: none; stroke: #666; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .bubble { fill: none; stroke: #bbb; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Asked vs Inferred Outputs</text>

  <!-- ASKED side -->
  <text x="220" y="60" text-anchor="middle" class="text-label" font-size="11" font-weight="700">ASKED</text>
  <text x="220" y="76" text-anchor="middle" class="text-muted" font-size="9">explicit question, explicit answer</text>

  <rect class="bubble" x="60" y="95" width="320" height="35" rx="17" stroke-width="1.2"/>
  <text x="220" y="117" text-anchor="middle" class="text-muted" font-size="10">AI: "What's your email?"</text>

  <rect class="bubble" x="60" y="140" width="320" height="35" rx="17" stroke-width="1.2"/>
  <text x="220" y="162" text-anchor="middle" class="text-muted" font-size="10">User: "jane@startup.com"</text>

  <line x1="220" y1="175" x2="220" y2="200" class="line" stroke-width="1.3"/>
  <polygon points="216,197 220,207 224,197" class="head"/>

  <rect class="box" x="90" y="210" width="260" height="50" rx="5" stroke-width="1.3"/>
  <text x="220" y="232" text-anchor="middle" class="text-primary" font-size="10">Regex validation</text>
  <text x="220" y="248" text-anchor="middle" class="text-muted" font-size="9">pass → PROVIDED</text>

  <!-- INFERRED side -->
  <text x="660" y="60" text-anchor="middle" class="text-label" font-size="11" font-weight="700">INFERRED</text>
  <text x="660" y="76" text-anchor="middle" class="text-muted" font-size="9">extracted from conversation, no explicit question</text>

  <rect class="bubble" x="500" y="95" width="320" height="35" rx="17" stroke-width="1.2"/>
  <text x="660" y="117" text-anchor="middle" class="text-muted" font-size="10">AI: "Tell me about your startup"</text>

  <rect class="bubble" x="500" y="140" width="320" height="35" rx="17" stroke-width="1.2"/>
  <text x="660" y="162" text-anchor="middle" class="text-muted" font-size="9">User: "We raised pre-seed from Antler..."</text>

  <line x1="660" y1="175" x2="660" y2="200" class="line" stroke-width="1.3"/>
  <polygon points="656,197 660,207 664,197" class="head"/>

  <rect class="box" x="520" y="210" width="280" height="50" rx="5" stroke-width="1.3"/>
  <text x="660" y="232" text-anchor="middle" class="text-primary" font-size="10">LLM extract: funding_stage</text>
  <text x="660" y="248" text-anchor="middle" class="text-muted" font-size="9">→ "pre-seed" (PROVIDED)</text>
</svg>
