<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-terminal { fill: none; stroke: #888; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
      .line { stroke: #888; fill: none; }
      .head { fill: #888; stroke: none; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-terminal { fill: none; stroke: #999; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
      .line { stroke: #999; fill: none; }
      .head { fill: #999; stroke: none; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Gather Field State Machine</text>

  <!-- PENDING -->
  <rect class="box" x="350" y="60" width="180" height="50" rx="5" stroke-width="1.5"/>
  <text x="440" y="83" text-anchor="middle" class="text-primary" font-size="11" font-weight="600">PENDING</text>
  <text x="440" y="99" text-anchor="middle" class="text-muted" font-size="9">initial state</text>

  <!-- Arrow down to INVALID (center) -->
  <line x1="440" y1="110" x2="440" y2="155" class="line" stroke-width="1.3"/>
  <polygon points="436,152 440,162 444,152" class="head"/>

  <!-- PROVIDED (valid) left branch -->
  <line x1="350" y1="85" x2="180" y2="180" class="line" stroke-width="1.3"/>
  <polygon points="183,176 175,182 181,185" class="head"/>
  <text x="240" y="130" class="text-muted" font-size="9">valid answer</text>

  <!-- PRE_FILLED path (far left) -->
  <line x1="440" y1="60" x2="80" y2="60" class="line" stroke-width="1.3"/>
  <line x1="80" y1="60" x2="80" y2="180" class="line" stroke-width="1.3"/>
  <polygon points="76,177 80,187 84,177" class="head"/>
  <text x="250" y="52" class="text-muted" font-size="9">found in prior messages</text>

  <rect class="box-terminal" x="30" y="190" width="120" height="50" rx="5" stroke-width="1.5"/>
  <text x="90" y="213" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">PRE_FILLED</text>
  <text x="90" y="229" text-anchor="middle" class="text-muted" font-size="8">terminal</text>

  <rect class="box-terminal" x="160" y="190" width="120" height="50" rx="5" stroke-width="1.5"/>
  <text x="220" y="213" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">PROVIDED</text>
  <text x="220" y="229" text-anchor="middle" class="text-muted" font-size="8">terminal</text>

  <!-- INVALID center -->
  <rect class="box" x="370" y="165" width="140" height="50" rx="5" stroke-width="1.3"/>
  <text x="440" y="188" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">INVALID</text>
  <text x="440" y="204" text-anchor="middle" class="text-muted" font-size="9">regex failed</text>

  <!-- Loop: INVALID → PENDING (re-ask, up to 3 times) -->
  <path d="M510 175 Q580 150 580 100 Q580 75 530 85" class="line" stroke-width="1.3"/>
  <polygon points="533,81 525,85 533,90" class="head"/>
  <text x="610" y="130" class="text-muted" font-size="9">re-ask (up to 3x)</text>

  <!-- INVALID → STALE after 3 attempts -->
  <line x1="440" y1="215" x2="440" y2="260" class="line" stroke-width="1.3" stroke-dasharray="3 3"/>
  <polygon points="436,257 440,267 444,257" class="head"/>
  <text x="450" y="240" class="text-muted" font-size="9">after 3 failed attempts</text>

  <rect class="box-terminal" x="370" y="270" width="140" height="50" rx="5" stroke-width="1.5"/>
  <text x="440" y="293" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">STALE</text>
  <text x="440" y="309" text-anchor="middle" class="text-muted" font-size="8">terminal — move on</text>

  <!-- Right: REFUSED -->
  <line x1="530" y1="85" x2="720" y2="180" class="line" stroke-width="1.3"/>
  <polygon points="717,176 725,182 719,185" class="head"/>
  <text x="640" y="130" class="text-muted" font-size="9">user refuses</text>

  <rect class="box-terminal" x="680" y="190" width="140" height="50" rx="5" stroke-width="1.5"/>
  <text x="750" y="213" text-anchor="middle" class="text-primary" font-size="10" font-weight="600">REFUSED</text>
  <text x="750" y="229" text-anchor="middle" class="text-muted" font-size="8">terminal</text>

  <text x="440" y="345" text-anchor="middle" class="text-muted" font-size="9">A Gather item ends only when every required field reaches a terminal state</text>
</svg>
