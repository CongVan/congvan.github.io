<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 320" fill="none">
  <style>
    text { font-family: 'Fira Mono', monospace; }
    @media (prefers-color-scheme: dark) {
      .box { fill: none; stroke: #555; }
      .box-outer { fill: none; stroke: #444; stroke-dasharray: 4 3; }
      .text-primary { fill: #dadadb; }
      .text-muted { fill: #888; }
      .text-label { fill: #aaa; }
    }
    @media (prefers-color-scheme: light) {
      .box { fill: none; stroke: #ccc; }
      .box-outer { fill: none; stroke: #ccc; stroke-dasharray: 4 3; }
      .text-primary { fill: #1a1a1a; }
      .text-muted { fill: #999; }
      .text-label { fill: #555; }
    }
  </style>

  <text x="440" y="30" text-anchor="middle" class="text-primary" font-size="13" font-weight="600">Redis Key Layout per Conversation</text>
  <text x="440" y="48" text-anchor="middle" class="text-muted" font-size="10">every key prefixed with `conversation:{id}:`</text>

  <!-- Outer grouping box -->
  <rect class="box-outer" x="40" y="65" width="800" height="225" rx="8" stroke-width="1.2"/>

  <!-- Key 1: stream -->
  <rect class="box" x="60" y="90" width="240" height="75" rx="5" stroke-width="1.3"/>
  <text x="75" y="112" class="text-label" font-size="10" font-weight="600">:stream</text>
  <text x="75" y="128" class="text-primary" font-size="10">Stream</text>
  <text x="75" y="144" class="text-muted" font-size="9">chat chunks + events</text>
  <text x="75" y="158" class="text-muted" font-size="9">(from Day 3)</text>

  <!-- Key 2: state -->
  <rect class="box" x="320" y="90" width="240" height="75" rx="5" stroke-width="1.3"/>
  <text x="335" y="112" class="text-label" font-size="10" font-weight="600">:state</text>
  <text x="335" y="128" class="text-primary" font-size="10">Hash</text>
  <text x="335" y="144" class="text-muted" font-size="9">mode, active agenda,</text>
  <text x="335" y="158" class="text-muted" font-size="9">current item, status</text>

  <!-- Key 3: agenda:outputs -->
  <rect class="box" x="580" y="90" width="240" height="75" rx="5" stroke-width="1.3"/>
  <text x="595" y="112" class="text-label" font-size="10" font-weight="600">:agenda:outputs</text>
  <text x="595" y="128" class="text-primary" font-size="10">Hash</text>
  <text x="595" y="144" class="text-muted" font-size="9">collected data:</text>
  <text x="595" y="158" class="text-muted" font-size="9">name, email, score...</text>

  <!-- Key 4: agenda:history -->
  <rect class="box" x="60" y="185" width="240" height="75" rx="5" stroke-width="1.3"/>
  <text x="75" y="207" class="text-label" font-size="10" font-weight="600">:agenda:history</text>
  <text x="75" y="223" class="text-primary" font-size="10">List</text>
  <text x="75" y="239" class="text-muted" font-size="9">completed item IDs</text>
  <text x="75" y="253" class="text-muted" font-size="9">with timestamps</text>

  <!-- Key 5: lock -->
  <rect class="box" x="320" y="185" width="240" height="75" rx="5" stroke-width="1.3"/>
  <text x="335" y="207" class="text-label" font-size="10" font-weight="600">:lock</text>
  <text x="335" y="223" class="text-primary" font-size="10">String + TTL</text>
  <text x="335" y="239" class="text-muted" font-size="9">prevents concurrent</text>
  <text x="335" y="253" class="text-muted" font-size="9">message processing</text>

  <!-- Empty slot for future -->
  <rect class="box" x="580" y="185" width="240" height="75" rx="5" stroke-width="1.3" stroke-dasharray="3 3"/>
  <text x="595" y="207" class="text-muted" font-size="10" font-weight="600">:deferred</text>
  <text x="700" y="228" text-anchor="middle" class="text-muted" font-size="10">+ more keys as</text>
  <text x="700" y="244" text-anchor="middle" class="text-muted" font-size="10">features grow</text>

  <text x="440" y="285" text-anchor="middle" class="text-muted" font-size="9">All keys share a 24h TTL — Redis is the working set, Postgres is the record</text>
</svg>
