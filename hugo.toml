baseURL = "https://congvan.github.io/"
languageCode = "en-us"
title = "Van Huynh"
theme = "PaperMod"
paginate = 10

buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
enableRobotsTXT = true

[minify]
  disableXML = true
  minifyOutput = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  title = "Van Huynh"
  description = "Senior Full-Stack Engineer. Building and scaling SaaS platforms with React, Node.js, Go, and AI."
  keywords = ["blog", "software engineering", "typescript", "python", "go", "fullstack", "ai", "devops"]
  author = "Van Huynh"
  DateFormat = "January 2, 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Hi, I'm Van Huynh"
    Content = "Senior Full-Stack Engineer with 8+ years of experience building and scaling SaaS platforms. From first commit to VC-funded product — I ship fast and build things that last."
    imageUrl = "images/avatar.jpg"
    imageTitle = "Van Huynh"
    imageWidth = 140
    imageHeight = 140

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/CongVan"

  [[params.socialIcons]]
    name = "linkedin"
    url = "https://linkedin.com/in/vanconghuynh"

  [[params.socialIcons]]
    name = "email"
    url = "mailto:congvan203@gmail.com"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

  [params.editPost]
    URL = "https://github.com/CongVan/congvan.github.io/tree/main/content"
    Text = "Suggest Changes"
    appendFilePath = true

  # Contact info for footer
  [params.contact]
    email = "congvan203@gmail.com"
    linkedin = "https://linkedin.com/in/vanconghuynh"
    github = "https://github.com/CongVan"
    location = "Ho Chi Minh City, Vietnam"

[[menu.main]]
  identifier = "posts"
  name = "Posts"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "about"
  name = "About"
  url = "/about/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = ""
  url = "/search/"
  weight = 40

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "monokai"

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
